<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공사일지">
<meta name="theme-color" content="#BA7517">
<title>공사 현장 사진 일지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#f2efea;font-family:'Apple SD Gothic Neo','Malgun Gothic','NanumGothic',sans-serif;color:#1a1a1a;font-size:16px;-webkit-font-smoothing:antialiased}

/* ══ 로그인 ══ */
#loginScreen{display:none;min-height:100vh;background:#f2efea;align-items:center;justify-content:center;padding:24px}
#loginScreen.show{display:flex}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo i{font-size:32px;color:#BA7517}
.login-logo span{font-size:18px;font-weight:700;color:#1a1a1a}
.login-sub{font-size:13px;color:#888;display:block;margin-top:2px}
.lf-group{margin-bottom:14px}
.lf-group label{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:6px;letter-spacing:.04em}
.lf-group input{width:100%;padding:13px 14px;border:.5px solid rgba(0,0,0,.18);border-radius:10px;font-size:15px;font-family:inherit;outline:none;background:#fafaf8;-webkit-appearance:none}
.lf-group input:focus{border-color:#BA7517;background:#fff}
.btn-login{width:100%;padding:15px;background:#BA7517;color:#FAEEDA;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-login:active{opacity:.82}
.login-err{font-size:13px;color:#c0392b;text-align:center;margin-top:10px;min-height:18px}

/* ══ 앱 ══ */
#appScreen{display:none}
#appScreen.show{display:block}

/* Header */
.hdr{background:#fff;border-bottom:.5px solid rgba(0,0,0,.10);padding:0 16px;padding-top:env(safe-area-inset-top,12px);position:sticky;top:0;z-index:20}
.hdr-row{display:flex;align-items:center;gap:10px;padding:12px 0}
.hdr-icon{font-size:22px;color:#BA7517;flex-shrink:0}
.proj-in{flex:1;font-size:16px;font-weight:500;color:#1a1a1a;background:none;border:none;outline:none;font-family:inherit;min-width:0}
.proj-in::placeholder{color:#ccc}
.hdr-user{display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-badge{font-size:12px;font-weight:600;color:#854F0B;background:#fef7ec;border:.5px solid #e8a830;padding:5px 10px;border-radius:7px}
.btn-logout{background:none;border:.5px solid rgba(0,0,0,.15);border-radius:7px;padding:5px 8px;cursor:pointer;font-size:18px;color:#aaa}
.btn-logout:active{opacity:.7}

/* 보내기 버튼 */
.btn-send{display:flex;align-items:center;gap:5px;padding:9px 14px;background:#BA7517;color:#FAEEDA;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:inherit}
.btn-send:active:not(:disabled){opacity:.75}
.btn-send:disabled{opacity:.45;cursor:not-allowed}

/* PDF 준비 배너 */
.banner{display:none;align-items:center;gap:10px;padding:9px 16px}
.banner.building{display:flex;background:#fff8ee;border-bottom:.5px solid #f0d080}
.banner.ready{display:flex;background:#f0faf0;border-bottom:.5px solid #90d090}
.bspin{width:16px;height:16px;border:2px solid #e8c070;border-top-color:#BA7517;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══ 보고서 정보 입력 ══ */
.info-wrap{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08)}
.info-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.info-toggle-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#555}
.info-toggle-left i{font-size:16px;color:#BA7517}
.info-required{font-size:11px;color:#c0392b;background:#fef5f5;padding:2px 7px;border-radius:5px;border:.5px solid #f5c6c6}
.info-chevron{font-size:18px;color:#bbb;transition:transform .2s}
.info-chevron.open{transform:rotate(180deg)}
.info-body{padding:0 16px 14px;display:none}
.info-body.open{display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-field{display:flex;flex-direction:column;gap:5px}
.info-field.full{grid-column:1/-1}
.info-field label{font-size:11px;font-weight:700;color:#999;letter-spacing:.04em}
.info-field input,.info-field select,.info-field textarea{padding:10px 12px;border:.5px solid rgba(0,0,0,.15);border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:#fafaf8;-webkit-appearance:none;color:#1a1a1a}
.info-field input:focus,.info-field select:focus,.info-field textarea:focus{border-color:#BA7517;background:#fff}
.info-field textarea{min-height:58px;resize:none;line-height:1.5}

/* Upload */
.up-bar{padding:10px 16px;background:#fff;border-bottom:.5px solid rgba(0,0,0,.08)}
.btn-up{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:14px;background:#fef7ec;border:1.5px dashed #e8a830;border-radius:12px;font-size:15px;color:#854F0B;cursor:pointer;font-family:inherit;font-weight:600}
.btn-up:active:not(:disabled){opacity:.7}
.btn-up:disabled{opacity:.5;cursor:not-allowed}
.spin{width:18px;height:18px;border:2.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;opacity:.55;flex-shrink:0}

/* Sections */
.sec-lbl{padding:14px 16px 6px;font-size:11px;font-weight:700;color:#aaa;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
.sec-dot{width:6px;height:6px;border-radius:50%;background:#BA7517;flex-shrink:0}

/* Main card */
.main-card{margin:0 16px 4px;background:#fff;border:1.5px solid #BA7517;border-radius:14px;overflow:hidden}
.main-img-wrap{position:relative}
.main-img{width:100%;display:block;max-height:240px;object-fit:cover}
.star-badge{position:absolute;top:10px;left:10px;background:#BA7517;color:#FAEEDA;font-size:11px;font-weight:700;padding:4px 11px;border-radius:6px;display:flex;align-items:center;gap:4px}
.main-time{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.58);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px}
.main-body{padding:12px 14px}
.no-main{padding:30px 20px;text-align:center}
.no-main i{font-size:36px;color:#ddd;display:block;margin-bottom:10px}
.no-main p{font-size:14px;color:#bbb}
.no-main small{font-size:12px;color:#ccc;display:block;margin-top:5px}

/* Date group */
.date-hdr{padding:9px 16px;font-size:12px;font-weight:600;color:#888;display:flex;align-items:center;gap:8px;background:#ece9e4;border-top:.5px solid rgba(0,0,0,.07);border-bottom:.5px solid rgba(0,0,0,.07);margin-top:8px}
.d-dot{width:7px;height:7px;border-radius:50%;background:#BA7517;flex-shrink:0}
.d-cnt{margin-left:auto;font-size:11px;color:#aaa}

/* Photo card */
.pcard{margin:8px 16px;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:14px;overflow:hidden}
.iw{position:relative;background:#ececec}
.pi{width:100%;display:block;max-height:240px;object-fit:cover}
.tbadge{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.58);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px}
.nbadge{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.92);border:.5px solid rgba(0,0,0,.15);color:#555;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px}
.cbody{padding:11px 14px}
.dta{width:100%;min-height:62px;font-size:14px;line-height:1.65;color:#1a1a1a;background:#f8f8f6;border:.5px solid rgba(0,0,0,.13);border-radius:9px;padding:9px 12px;resize:none;font-family:inherit;outline:none;-webkit-appearance:none}
.dta::placeholder{color:#ccc}
.cfooter{display:flex;align-items:center;gap:7px;margin-top:9px}
.btn-star{font-size:13px;padding:9px 11px;background:none;border:.5px solid rgba(0,0,0,.15);border-radius:9px;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;flex:1;font-family:inherit;font-weight:500}
.btn-star:active{opacity:.7}
.btn-del{font-size:20px;padding:8px 10px;background:none;border:.5px solid rgba(0,0,0,.15);border-radius:9px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del:active{opacity:.7}
.btn-save{font-size:13px;padding:9px 18px;background:#BA7517;color:#FAEEDA;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-weight:600;margin-left:auto}
.btn-save:active{opacity:.78}
.ok-flash{font-size:12px;color:#3B6D11;display:none;align-items:center;gap:3px;white-space:nowrap}
.empty{text-align:center;padding:56px 24px}
.empty i{font-size:48px;display:block;margin-bottom:14px;color:#ddd}
.empty p{font-size:15px;color:#aaa}
.empty small{font-size:13px;color:#ccc;display:block;margin-top:6px}

/* Toast */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+76px);left:50%;transform:translateX(-50%);background:rgba(20,20,20,.84);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:22px;white-space:pre-line;text-align:center;opacity:0;transition:opacity .25s;pointer-events:none;z-index:700;backdrop-filter:blur(6px)}
.toast.show{opacity:1}

/* ══ 제출 진행 오버레이 ══ */
.submit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:800;align-items:center;justify-content:center;padding:20px}
.submit-overlay.show{display:flex}
.submit-box{background:#fff;border-radius:22px;padding:36px 28px;text-align:center;width:100%;max-width:320px}
.submit-spin{width:52px;height:52px;border:4px solid #f0d080;border-top-color:#BA7517;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 18px}
.submit-box h3{font-size:18px;font-weight:700;margin-bottom:8px}
.submit-box p{font-size:13px;color:#888;line-height:1.6}
.submit-step{font-size:12px;color:#BA7517;margin-top:10px;font-weight:600}

/* ══ 완료 화면 ══ */
#doneScreen{display:none;min-height:100vh;background:#f2efea;align-items:flex-start;justify-content:center;padding:40px 20px}
#doneScreen.show{display:flex}
.done-card{background:#fff;border-radius:22px;padding:36px 24px;width:100%;max-width:400px;text-align:center}
.done-card .big-icon{font-size:60px;color:#BA7517;display:block;margin-bottom:16px}
.done-card h2{font-size:22px;font-weight:700;margin-bottom:8px}
.done-card .done-sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.6}
.done-info{background:#fef7ec;border:.5px solid #e8a830;border-radius:12px;padding:16px;margin-bottom:24px;text-align:left}
.done-info-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
.done-info-row:not(:last-child){border-bottom:.5px solid rgba(0,0,0,.07)}
.done-info-row .lbl{color:#888}
.done-info-row .val{font-weight:600;color:#1a1a1a}
.btn-new2{width:100%;padding:15px;background:#BA7517;color:#FAEEDA;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-new2:active{opacity:.78}

.footer-pad{height:calc(env(safe-area-inset-bottom,0px)+40px)}

/* ══ 탭 바 ══ */
.tab-bar{display:flex;background:#fff;border-bottom:.5px solid rgba(0,0,0,.10)}
.tab-btn{flex:1;padding:11px 0;font-size:13px;font-weight:600;color:#aaa;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.active{color:#BA7517;border-bottom-color:#BA7517}
.tab-btn i{font-size:17px}
#myReportsScreen{display:none}
#myReportsScreen.show{display:block}
.rlist-empty{text-align:center;padding:56px 24px;color:#bbb}
.rlist-empty i{font-size:44px;display:block;margin-bottom:12px}
.rlist-item{margin:8px 16px;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:14px;overflow:hidden;cursor:pointer;display:flex}
.rlist-item:active{opacity:.8}
.rlist-thumb{width:84px;height:84px;object-fit:cover;flex-shrink:0;background:#ececec;display:block}
.rlist-thumb-ph{width:84px;height:84px;flex-shrink:0;background:#f0ede8;display:flex;align-items:center;justify-content:center}
.rlist-thumb-ph i{font-size:28px;color:#ddd}
.rlist-body{flex:1;padding:12px 14px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.rlist-title{font-size:15px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rlist-meta{font-size:12px;color:#888;margin-top:4px}
.rlist-status{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;margin-top:6px;align-self:flex-start}
.status-submitted{background:#fff8ee;color:#854F0B;border:.5px solid #f0c040}
.status-reviewed{background:#f0faf0;color:#2E7D32;border:.5px solid #90d090}
.rlist-arr{display:flex;align-items:center;padding-right:14px;color:#ddd;font-size:20px}
#editScreen{display:none}
#editScreen.show{display:block}
.edit-hdr{background:#fff;border-bottom:.5px solid rgba(0,0,0,.10);padding:0 16px;padding-top:env(safe-area-inset-top,12px);position:sticky;top:0;z-index:20}
.edit-hdr-row{display:flex;align-items:center;gap:10px;padding:12px 0}
.btn-back2{display:flex;align-items:center;gap:4px;background:none;border:none;color:#BA7517;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0;flex-shrink:0}
.edit-section{margin:10px 16px;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:14px;overflow:hidden}
.edit-sec-hdr{padding:11px 14px;font-size:11px;font-weight:700;color:#aaa;letter-spacing:.05em;border-bottom:.5px solid rgba(0,0,0,.07);display:flex;align-items:center;gap:6px}
.edit-sec-hdr i{font-size:15px;color:#BA7517}
.edit-field{padding:11px 14px;border-bottom:.5px solid rgba(0,0,0,.06)}
.edit-field:last-child{border-bottom:none}
.edit-field label{display:block;font-size:11px;font-weight:700;color:#bbb;letter-spacing:.04em;margin-bottom:5px}
.edit-field input,.edit-field select,.edit-field textarea{width:100%;padding:8px 10px;border:.5px solid rgba(0,0,0,.13);border-radius:8px;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8;-webkit-appearance:none}
.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{border-color:#BA7517;background:#fff}
.edit-field textarea{min-height:62px;resize:none;line-height:1.5}
.btn-save-edit{width:calc(100% - 32px);margin:12px 16px;padding:14px;background:#BA7517;color:#FAEEDA;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-save-edit:active{opacity:.82}
.btn-save-edit:disabled{opacity:.5;cursor:not-allowed}
.edit-photo-card{margin:8px 16px;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:14px;overflow:hidden}
.edit-photo-img{width:100%;max-height:220px;object-fit:cover;display:block;background:#ececec}
.edit-photo-body{padding:10px 14px}
.edit-photo-meta{font-size:11px;color:#aaa;margin-bottom:7px}
.reviewed-notice{margin:10px 16px;padding:11px 14px;background:#f0faf0;border:.5px solid #90d090;border-radius:10px;font-size:13px;color:#2E7D32;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <i class="ti ti-building-factory-2"></i>
      <div>
        <span>공사 현장 사진 일지</span>
        <span class="login-sub">작업자 로그인</span>
      </div>
    </div>
    <div class="lf-group">
      <label>아이디</label>
      <input type="text" id="lgUser" placeholder="아이디를 입력하세요" autocomplete="username" autocapitalize="none">
    </div>
    <div class="lf-group">
      <label>비밀번호</label>
      <input type="password" id="lgPass" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    </div>
    <button class="btn-login" id="lgBtn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="lgErr"></div>
  </div>
</div>

<!-- ══ 메인 앱 ══ -->
<div id="appScreen">

  <div class="hdr">
    <div class="hdr-row">
      <i class="ti ti-building-factory-2 hdr-icon"></i>
      <input id="pjIn" class="proj-in" placeholder="보고서 제목을 입력하세요">
      <div class="hdr-user">
        <span class="user-badge" id="userBadge">-</span>
        <button class="btn-logout" onclick="doLogout()" title="로그아웃"><i class="ti ti-logout"></i></button>
      </div>
      <button id="sendBtn" class="btn-send" onclick="onSendClick()">
        <i class="ti ti-send"></i>제출
      </button>
    </div>
  </div>


  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabWrite" onclick="switchTab('write')">
      <i class="ti ti-camera-plus"></i>새 보고서
    </button>
    <button class="tab-btn" id="tabMy" onclick="switchTab('my')">
      <i class="ti ti-clipboard-list"></i>내 보고서
    </button>
  </div>

  <!-- PDF 상태 배너 -->
  <div class="banner" id="banner">
    <div class="bspin" id="bannerSpin"></div>
    <i class="ti ti-circle-check" id="bannerIcon" style="color:#2E7D32;font-size:18px;display:none"></i>
    <span id="bannerMsg" style="font-size:13px"></span>
  </div>

  <!-- 보고서 정보 -->
  <div class="info-wrap" id="infoWrap">
    <div class="info-toggle" onclick="toggleInfo()">
      <div class="info-toggle-left">
        <i class="ti ti-clipboard-text"></i>
        보고서 정보
        <span class="info-required" id="infoReq">필수 입력</span>
      </div>
      <i class="ti ti-chevron-down info-chevron" id="infoChevron"></i>
    </div>
    <div class="info-body" id="infoBody">
      <div class="info-grid">
        <div class="info-field full">
          <label>현장명</label>
          <input type="text" id="siteIn" placeholder="공사 현장명 (예: 강남구 삼성동 OO빌딩)">
        </div>
        <div class="info-field">
          <label>작업일</label>
          <input type="date" id="dateIn">
        </div>
        <div class="info-field">
          <label>날씨</label>
          <select id="weatherSel">
            <option value="">선택</option>
            <option>맑음 ☀️</option>
            <option>구름조금 🌤️</option>
            <option>흐림 ☁️</option>
            <option>비 🌧️</option>
            <option>눈 ❄️</option>
          </select>
        </div>
        <div class="info-field">
          <label>기온</label>
          <input type="text" id="tempIn" placeholder="예) 23°C">
        </div>
        <div class="info-field full">
          <label>공종</label>
          <input type="text" id="workTypeIn" placeholder="예) 철근 배근, 콘크리트 타설">
        </div>
        <div class="info-field full">
          <label>특이사항</label>
          <textarea id="notesIn" placeholder="현장 특이사항이나 메모를 입력하세요"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="up-bar" id="upBar">
    <input type="file" id="fi" accept="image/*" multiple style="display:none">
    <button id="upBtn" class="btn-up" onclick="document.getElementById('fi').click()">
      <i class="ti ti-camera-plus" style="font-size:22px"></i>현장 사진 추가
    </button>
  </div>

  <div class="sec-lbl"><span class="sec-dot"></span>대표 사진 (표지)</div>
  <div id="mainSec"></div>
  <div id="otherHdr" class="sec-lbl" style="display:none"><span class="sec-dot"></span>현장 사진</div>
  <div id="tl"></div>
  <div class="footer-pad"></div>
  <div class="toast" id="toast"></div>

  <!-- 제출 중 오버레이 -->
  <div class="submit-overlay" id="submitOverlay">
    <div class="submit-box">

async function doLogin(){
  const u=document.getElementById('lgUser').value.trim();
  const p=document.getElementById('lgPass').value;
  const errEl=document.getElementById('lgErr');
  const btn=document.getElementById('lgBtn');
  if(!u||!p){errEl.textContent='아이디와 비밀번호를 입력하세요';return;}
  btn.disabled=true;btn.textContent='확인 중...';errEl.textContent='';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){errEl.textContent=d.error||'로그인 실패';return;}
    token=d.token;currentUser=d.user;
    localStorage.setItem('cj_token',token);
    showApp();
  }catch{errEl.textContent='서버에 연결할 수 없습니다';}
  finally{btn.disabled=false;btn.textContent='로그인';}
}

async function checkAuth(){
  if(!token){showLogin();return;}
  try{
    const r=await fetch('/api/auth/me',{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok){clearAuth();showLogin();return;}
    currentUser=await r.json();
    // 관리자 계정으로 접속 시 로그인 화면 표시
    if(currentUser.role==='admin'){clearAuth();showLogin();return;}
    showApp();
  }catch{showLogin();}
}

function clearAuth(){token=null;currentUser=null;localStorage.removeItem('cj_token');}
function doLogout(){clearAuth();location.reload();}

function showLogin(){
  document.getElementById('loginScreen').className='show';
  document.getElementById('appScreen').className='';
  document.getElementById('doneScreen').className='';
}
function showApp(){
  document.getElementById('loginScreen').className='';
  document.getElementById('appScreen').className='show';
  document.getElementById('doneScreen').className='';
  if(currentUser)document.getElementById('userBadge').textContent=currentUser.name||currentUser.username;
  // 날짜 기본값 오늘
  const di=document.getElementById('dateIn');
  if(!di.value)di.value=new Date().toISOString().slice(0,10);
  render();
}

function showToast(msg,dur=2800){

  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',dur);

/* ════════════════════════════════════

════════════════════════════════════ */
function setBanner(state,msg){
  const el=document.getElementById('banner');
  const spin=document.getElementById('bannerSpin');
  const icon=document.getElementById('bannerIcon');
  const msgEl=document.getElementById('bannerMsg');
  el.className='banner';

    el.classList.add('ready');spin.style.display='none';icon.style.display='block';
    msgEl.style.color='#2a6a2a';msgEl.textContent='보고서 준비 완료 ✓  —  제출 버튼을 누르세요';

/* ════════════════════════════════════
   백그라운드 PDF 빌드
════════════════════════════════════ */
function scheduleBuild(){
  pdfBlob=null;clearTimeout(buildTimer);setBanner('idle');
  if(!photos.length)return;
  buildTimer=setTimeout(async()=>{
    if(pdfBuilding||!photos.length)return;
    pdfBuilding=true;setBanner('building');
    try{
      pdfBlob=await buildPDFBlob(m=>setBanner('building',m));
      pdfFname=makeFname();setBanner('ready');
    }catch(e){console.warn(e);setBanner('idle');}
    pdfBuilding=false;
  },900);
}
function makeFname(){
  const site=document.getElementById('siteIn').value.trim()||'현장';
  const date=document.getElementById('dateIn').value||new Date().toISOString().slice(0,10);
  return`${site}_${date}_사진보고서.pdf`;
}

async function onSendClick(){
  if(!photos.length){showToast('사진을 먼저 추가해주세요');return;}
  const site=document.getElementById('siteIn').value.trim();
  if(!site){
    toggleInfo();
    showToast('현장명을 입력해주세요',3000);
    document.getElementById('siteIn').focus();
    return;
  }
  if(pdfBuilding){showToast('PDF 준비 중입니다.\n잠시 후 다시 눌러주세요',2500);return;}

  // PDF가 없으면 먼저 생성
  if(!pdfBlob){
    document.getElementById('submitStep').textContent='PDF 생성 중...';
    document.getElementById('submitOverlay').className='submit-overlay show';
    try{
      pdfBlob=await buildPDFBlob(m=>{document.getElementById('submitStep').textContent=m;});
      pdfFname=makeFname();
    }catch(e){
      document.getElementById('submitOverlay').className='submit-overlay';
      showToast('PDF 생성 오류. 다시 시도해주세요.',3500);return;
    }
  } else {
    document.getElementById('submitStep').textContent='서버에 전송 중...';
    document.getElementById('submitOverlay').className='submit-overlay show';
  }

  try{
    await uploadToServer();
  }catch(e){
    document.getElementById('submitOverlay').className='submit-overlay';
    showToast('제출 오류: '+e.message,4000);
  }
}

/* ════════════════════════════════════
   서버 업로드
════════════════════════════════════ */
function dataURLtoBlob(dataURL){
  const [head,b64]=dataURL.split(',');
  const mime=head.match(/:(.*?);/)[1];
  const bin=atob(b64);const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

async function uploadToServer(){
  document.getElementById('submitStep').textContent='사진 준비 중...';

  const meta={
    project_name:document.getElementById('pjIn').value||projName,
    site_name:document.getElementById('siteIn').value.trim(),
    work_date:document.getElementById('dateIn').value,
    weather:document.getElementById('weatherSel').value,
    temperature:document.getElementById('tempIn').value.trim(),
    work_type:document.getElementById('workTypeIn').value.trim(),
    notes:document.getElementById('notesIn').value.trim()
  };

  const mp=photos.find(p=>p.id===mainId)||photos[0];
  const others=photos.filter(p=>p.id!==mp?.id).sort((a,b)=>a.timestamp-b.timestamp);
  const ordered=mp?[mp,...others]:others;

  const formData=new FormData();
  formData.append('meta',JSON.stringify(meta));

  const photosMeta=[];
  for(let i=0;i<ordered.length;i++){
    const p=ordered[i];
    document.getElementById('submitStep').textContent=`사진 업로드 중... (${i+1}/${ordered.length})`;
    const blob=dataURLtoBlob(pdata[p.id]);
    formData.append('photos',blob,`photo_${i+1}.jpg`);
    photosMeta.push({
      original_name:p.filename,
      timestamp:p.timestamp,
      description:p.description||'',
      is_main:p.id===mp?.id?1:0,
      sort_order:i
    });
  }
  formData.append('photos_meta',JSON.stringify(photosMeta));

  document.getElementById('submitStep').textContent='PDF 업로드 중...';
  formData.append('pdf',pdfBlob,pdfFname);

  document.getElementById('submitStep').textContent='서버에 저장 중...';
  const r=await fetch('/api/reports',{
    method:'POST',
    headers:{Authorization:`Bearer ${token}`},
    body:formData
  });
  if(!r.ok){
    const d=await r.json().catch(()=>({}));
    throw new Error(d.error||`서버 오류 (${r.status})`);
  }
  const result=await r.json();
  document.getElementById('submitOverlay').className='submit-overlay';
  showDone(result.id,meta,ordered.length);
}

/* ════════════════════════════════════
   EXIF / 압축
════════════════════════════════════ */
async function extractTS(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const t=new TextDecoder('ascii',{fatal:false}).decode(new Uint8Array(e.target.result));
        const m=t.match(/(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
        if(m){const v=new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]).getTime();if(v>0){res(v);return;}}
      }catch{}
      res(file.lastModified||Date.now());
    };
    r.readAsArrayBuffer(file.slice(0,131072));
  });
}
async function compress(file){
  return new Promise(res=>{
    const u=URL.createObjectURL(file),img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(u);
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>1200){h=Math.round(h*1200/w);w=1200;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',.80));
    };
    img.onerror=()=>{URL.revokeObjectURL(u);res(null);};
    img.src=u;
  });
}

   업로드 이벤트
════════════════════════════════════ */
document.getElementById('pjIn').addEventListener('input',e=>{projName=e.target.value||'공사 현장 사진 보고서';scheduleBuild();});
document.getElementById('fi').addEventListener('change',async e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  const btn=document.getElementById('upBtn');btn.disabled=true;let added=0;
  for(let i=0;i<files.length;i++){
    btn.innerHTML=`<div class="spin"></div>처리 중... (${i+1}/${files.length})`;
    const f=files[i],id=genId(),ts=await extractTS(f),src=await compress(f);
    if(!src)continue;
    photos.push({id,timestamp:ts,filename:f.name,description:''});
    pdata[id]=src;added++;if(!mainId)mainId=id;
  }
  if(added>0){photos.sort((a,b)=>a.timestamp-b.timestamp);showToast(`${added}장 추가 완료`);}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-camera-plus" style="font-size:22px"></i>현장 사진 추가';
  e.target.value='';render();scheduleBuild();
});

function saveAllDescs(){
  // 대표 사진 설명
  const mainTa=document.getElementById('mainDta');
  if(mainTa&&mainId){const mp=photos.find(p=>p.id===mainId);if(mp)mp.description=mainTa.value;}

  photos.forEach(p=>{
    const ta=document.querySelector(`textarea[data-id="${p.id}"]`);
    if(ta)p.description=ta.value;
  });
}

window.saveDesc=function(id,isMain){
  const ta=document.querySelector(isMain?'#mainDta':`textarea[data-id="${id}"]`);
  if(!ta)return;
  const p=photos.find(x=>x.id===id);if(p)p.description=ta.value;
  const ok=document.querySelector(isMain?'#mainOk':`.ok-flash[data-id="${id}"]`);
  if(ok){ok.style.display='flex';setTimeout(()=>ok.style.display='none',1400);}
  scheduleBuild();
};
window.delPhoto=function(id){
  saveAllDescs();
  if(!confirm('이 사진을 삭제하시겠습니까?'))return;
  if(mainId===id)mainId=null;
  photos=photos.filter(p=>p.id!==id);delete pdata[id];
  render();showToast('삭제되었습니다');scheduleBuild();
};

   렌더
════════════════════════════════════ */
function render(){
  const ms=document.getElementById('mainSec'),tl=document.getElementById('tl'),oh=document.getElementById('otherHdr');
  const mp=photos.find(p=>p.id===mainId);
  const others=photos.filter(p=>p.id!==mainId).sort((a,b)=>a.timestamp-b.timestamp);
  if(mp){
    ms.innerHTML=`<div class="main-card">
      <div class="main-img-wrap">
        <img class="main-img" src="${pdata[mp.id]}" alt="대표 사진">
        <span class="star-badge"><i class="ti ti-star-filled" style="font-size:11px"></i>대표 사진</span>
        <span class="main-time">${fmtTime(mp.timestamp)}</span>
      </div>
      <div class="main-body">
        <textarea id="mainDta" class="dta" placeholder="표지 사진 설명을 입력하세요...">${mp.description||''}</textarea>
        <div class="cfooter">
          <button class="btn-del" onclick="delPhoto('${mp.id}')"><i class="ti ti-trash"></i></button>
          <span class="ok-flash" id="mainOk"><i class="ti ti-check"></i>입력됨</span>
          <button class="btn-save" onclick="saveDesc('${mp.id}',true)">확인</button>
        </div>
      </div></div>`;
  }else{
    ms.innerHTML=`<div class="main-card"><div class="no-main"><i class="ti ti-star"></i><p>대표 사진 미설정</p><small>아래 ☆ 버튼으로 설정하세요</small></div></div>`;
  }
  if(!others.length){
    oh.style.display='none';
    tl.innerHTML=photos.length===0?`<div class="empty"><i class="ti ti-photo-off"></i><p>아직 사진이 없습니다</p><small>위 버튼으로 현장 사진을 추가하세요</small></div>`:'';
    return;
  }
  oh.style.display='flex';
  const groups={};others.forEach(p=>{const dk=fmtDK(p.timestamp);if(!groups[dk])groups[dk]=[];groups[dk].push(p);});
  let html='',seq=1;
  for(const dk of Object.keys(groups).sort()){
    const g=groups[dk];
    html+=`<div><div class="date-hdr"><span class="d-dot"></span>${fmtDate(g[0].timestamp)}<span class="d-cnt">${g.length}장</span></div>`;
    for(const p of g){
      html+=`<div class="pcard"><div class="iw">
        <img class="pi" src="${pdata[p.id]}" alt="사진 ${seq}" loading="lazy">
        <span class="tbadge">${fmtTime(p.timestamp)}</span>
        <span class="nbadge">#${seq}</span>
      </div>
      <div class="cbody">
        <textarea class="dta" data-id="${p.id}" placeholder="이 사진에 대한 설명을 입력하세요...">${p.description||''}</textarea>
        <div class="cfooter">
          <button class="btn-star" onclick="setMain('${p.id}')"><i class="ti ti-star"></i>대표 사진</button>
          <button class="btn-del" onclick="delPhoto('${p.id}')"><i class="ti ti-trash"></i></button>
          <span class="ok-flash" data-id="${p.id}"><i class="ti ti-check"></i></span>
          <button class="btn-save" onclick="saveDesc('${p.id}',false)">확인</button>
        </div>
      </div></div>`;seq++;
    }
    html+='</div>';
  }
  tl.innerHTML=html;
}

/* ════════════════════════════════════
   PDF 생성 (기존 로직 + 보고서 정보 추가)
════════════════════════════════════ */
function coverHTML(proj,src,st){
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const site=document.getElementById('siteIn').value.trim();
  const wdate=document.getElementById('dateIn').value;
  const weather=document.getElementById('weatherSel').value;
  const temp=document.getElementById('tempIn').value.trim();
  const workType=document.getElementById('workTypeIn').value.trim();
  const notes=document.getElementById('notesIn').value.trim();
  const workerName=currentUser?.name||'작업자';
  const infoRows=[
    ['현장명',site||'-'],
    ['작업일',wdate||today],
    ['날씨',weather+(temp?' / '+temp:'')],
    ['공종',workType||'-'],
    ['촬영 기간',st.period],
    ['총 사진 수',`표지 1장 + 현장 ${st.inner}장 (전체 ${st.total}장)`],
    ['제출자',workerName],
    ...(notes?[['특이사항',notes]]:[])
  ];
  return`<div style="width:794px;height:1123px;background:#fff;font-family:${FF};display:flex;flex-direction:column;overflow:hidden">
  <div style="background:#BA7517;padding:32px 48px;flex-shrink:0">
    <div style="color:#FAEEDA;font-size:26px;font-weight:700">${esc(site||proj)}</div>
    <div style="color:rgba(250,238,218,.72);font-size:15px;margin-top:7px">공사 현장 사진 보고서</div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:28px 48px;background:#f8f8f8">
    <img src="${src}" style="max-width:680px;max-height:460px;object-fit:contain;border:1px solid #e0e0e0">
  </div>
  <div style="padding:22px 48px;border-top:1px solid #eee">
    <table style="width:100%;border-collapse:collapse;font-size:13px;color:#333">
      ${infoRows.map((r,i)=>`<tr style="${i<infoRows.length-1?'border-bottom:1px solid #f0f0f0':''}">
        <td style="padding:8px 0;color:#888;width:110px;vertical-align:top">${r[0]}</td>
        <td style="padding:8px 0">${esc(r[1])}</td>
      </tr>`).join('')}
    </table>
  </div>
  <div style="padding:12px 48px;background:#f5f5f5;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between">
    <span style="font-size:12px;color:#aaa">공사 현장 사진 일지</span>
    <span style="font-size:12px;color:#aaa">1 / ${st.pages}</span>
  </div></div>`;
}

function pBlock(p,src,seq){
  if(!p)return`<div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px 48px"><div style="width:100%;height:100%;border:1.5px dashed #e0e0e0;border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="font-size:13px;color:#ccc">해당 없음</span></div></div>`;
  const dt=new Date(p.timestamp).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  return`<div style="flex:1;display:flex;flex-direction:column;padding:10px 48px;min-height:0;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0">
      <span style="background:#BA7517;color:#FAEEDA;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px">#${seq}</span>
      <span style="font-size:12px;color:#888">${dt}</span>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:#f8f8f8;border:1px solid #e8e8e8;overflow:hidden;max-height:295px">
      <img src="${src}" style="max-width:100%;max-height:295px;object-fit:contain;display:block">
    </div>
    <div style="margin-top:8px;padding:9px 13px;background:#fff;border:1px solid #e8e8e8;border-radius:4px;min-height:52px;font-size:13px;color:${p.description?'#333':'#bbb'};line-height:1.65">${p.description?esc(p.description):'(설명 없음)'}</div>
  </div>`;
}

function pgHTML(proj,p1,s1,p2,s2,pn,tp,i1,i2){
  return`<div style="width:794px;height:1123px;background:#fff;font-family:${FF};display:flex;flex-direction:column;overflow:hidden">
  <div style="padding:14px 48px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <span style="font-size:14px;font-weight:700;color:#222">${esc(proj)}</span>
    <span style="font-size:12px;color:#bbb">현장 사진 보고서</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;min-height:0">
    ${pBlock(p1,s1,i1)}
    <div style="height:1px;background:#eee;margin:0 48px;flex-shrink:0"></div>
    ${pBlock(p2,s2,i2)}
  </div>
  <div style="padding:14px 48px;background:#f5f5f5;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between;flex-shrink:0">
    <span style="font-size:12px;color:#aaa">공사 현장 사진 일지</span>
    <span style="font-size:12px;color:#aaa">${pn} / ${tp}</span>
  </div></div>`;
}

async function waitImgs(el){
  const imgs=el.querySelectorAll('img');if(!imgs.length)return;
  await Promise.all(Array.from(imgs).map(img=>{
    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    return new Promise(r=>{img.onload=img.onerror=r;});
  }));
  await new Promise(r=>setTimeout(r,80));
}

async function buildPDFBlob(onStep){
  const mp=photos.find(p=>p.id===mainId)||photos[0];
  const others=photos.filter(p=>p.id!==mp.id).sort((a,b)=>a.timestamp-b.timestamp);
  const total=1+Math.ceil(others.length/2);
  const ts=photos.map(p=>p.timestamp).sort((a,b)=>a-b);
  const st={
    period:ts.length>1?`${fmtShort(ts[0])} ~ ${fmtShort(ts[ts.length-1])}`:fmtShort(ts[0]),
    total:photos.length,inner:others.length,pages:total
  };
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({format:'a4',unit:'mm'});
  const box=document.createElement('div');
  box.style.cssText='position:absolute;left:-9999px;top:0;width:794px';
  document.body.appendChild(box);
  const cap=async(html,step)=>{
    if(onStep)onStep(step);box.innerHTML=html;await waitImgs(box);
    const cv=await html2canvas(box.firstElementChild,{scale:2,useCORS:false,allowTaint:true,backgroundColor:'#ffffff',logging:false,width:794,height:1123});
    return cv.toDataURL('image/jpeg',.92);
  };
  const projDisplay=document.getElementById('siteIn').value.trim()||projName;
  doc.addImage(await cap(coverHTML(projDisplay,pdata[mp.id],st),'표지 생성 중...'),'JPEG',0,0,210,297);
  for(let i=0;i<others.length;i+=2){
    doc.addPage();
    const p1=others[i],p2=others[i+1]||null,pn=2+Math.floor(i/2);
    doc.addImage(
      await cap(pgHTML(projDisplay,p1,pdata[p1.id],p2,p2?pdata[p2.id]:null,pn,total,i+1,p2?i+2:null),`${pn}/${total} 페이지 생성 중...`),
      'JPEG',0,0,210,297
    );
  }
  document.body.removeChild(box);
  return doc.output('blob');
}


/* ════════════════════════════════════
   탭 전환
════════════════════════════════════ */
function switchTab(tab){
  const isWrite = tab==='write';
  document.getElementById('tabWrite').className='tab-btn'+(isWrite?' active':'');
  document.getElementById('tabMy').className='tab-btn'+(!isWrite?' active':'');
  // 새 보고서 콘텐츠
  ['banner','infoWrap','upBar','mainSec','otherHdr','tl'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display=isWrite?'':'none';
  });
  // sec-lbl 첫번째 (대표사진 라벨) 도 숨기기
  const secLbls=document.querySelectorAll('#appScreen .sec-lbl');
  secLbls.forEach(el=>el.style.display=isWrite?'':'none');
  document.getElementById('myReportsScreen').className=isWrite?'':'show';
  document.getElementById('editScreen').className='';
  if(!isWrite)loadMyReports();
}

/* ════════════════════════════════════
   내 보고서 목록
════════════════════════════════════ */
async function loadMyReports(){
  const el=document.getElementById('myReportsList');
  el.innerHTML='<div class="rlist-empty"><i class="ti ti-loader" style="animation:sp .7s linear infinite"></i></div>';
  try{
    const r=await fetch('/api/reports',{headers:{Authorization:`Bearer ${token}`}});
    const reports=await r.json();
    if(!reports.length){
      el.innerHTML='<div class="rlist-empty"><i class="ti ti-clipboard-off"></i><p>제출한 보고서가 없습니다</p></div>';
      return;
    }
    el.innerHTML=reports.map(rp=>`
      <div class="rlist-item" onclick="openEditReport(${rp.id})">
        <div class="${rp.photo_count?'':'rlist-thumb-ph'}">
          ${rp.photo_count?`<img class="rlist-thumb" src="/uploads/placeholder" onerror="this.parentNode.className='rlist-thumb-ph';this.parentNode.innerHTML='<i class=\'ti ti-photo\'></i>'" loading="lazy" id="rthumb-${rp.id}">`:'<i class="ti ti-photo" style="font-size:28px;color:#ddd"></i>'}
        </div>
        <div class="rlist-body">
          <div class="rlist-title">${rp.site_name||rp.project_name}</div>
          <div class="rlist-meta">${rp.work_date||'-'} · 사진 ${rp.photo_count}장</div>
          <span class="rlist-status ${rp.status==='reviewed'?'status-reviewed':'status-submitted'}">
            ${rp.status==='reviewed'?'✓ 검토 완료':'검토 대기'}
          </span>
        </div>
        <div class="rlist-arr"><i class="ti ti-chevron-right"></i></div>
      </div>
    `).join('');
    // 썸네일 로드
    for(const rp of reports){
      const r2=await fetch(`/api/reports/${rp.id}`,{headers:{Authorization:`Bearer ${token}`}});
      const d=await r2.json();
      const mainPhoto=(d.photos||[]).find(p=>p.is_main)||(d.photos||[])[0];
      if(mainPhoto){
        const el2=document.getElementById(`rthumb-${rp.id}`);
        if(el2)el2.src=`/uploads/${mainPhoto.filename}`;
      }
    }
  }catch(e){el.innerHTML='<div class="rlist-empty"><p>로드 오류</p></div>';}
}

let editReportData=null;

async function openEditReport(id){
  document.getElementById('myReportsScreen').className='';
  document.getElementById('editScreen').className='show';
  document.getElementById('editTitle').textContent='불러오는 중...';
  document.getElementById('editPhotosList').innerHTML='';
  document.getElementById('editPhotosHdr').textContent='';
  document.getElementById('editReviewedNotice').innerHTML='';
  try{
    const r=await fetch(`/api/reports/${id}`,{headers:{Authorization:`Bearer ${token}`}});
    editReportData=await r.json();
    renderEditForm();
  }catch(e){showToast('불러오기 오류');}
}

function renderEditForm(){
  const rp=editReportData;
  document.getElementById('editTitle').textContent=rp.site_name||rp.project_name||'보고서';
  const reviewed=rp.status==='reviewed';
  if(reviewed){
    document.getElementById('editReviewedNotice').innerHTML=
      '<div class="reviewed-notice"><i class="ti ti-circle-check" style="font-size:18px;flex-shrink:0"></i>관리자가 검토 완료한 보고서입니다. 수정이 제한될 수 있습니다.</div>';
  }
  document.getElementById('er-site').value=rp.site_name||'';
  document.getElementById('er-date').value=rp.work_date||'';
  document.getElementById('er-weather').value=rp.weather||'';
  document.getElementById('er-temp').value=rp.temperature||'';
  document.getElementById('er-worktype').value=rp.work_type||'';
  document.getElementById('er-notes').value=rp.notes||'';
  // 사진 목록
  const photos=(rp.photos||[]).sort((a,b)=>(a.sort_order-b.sort_order)||(a.exif_timestamp-b.exif_timestamp));
  document.getElementById('editPhotosHdr').textContent=`사진 (${photos.length}장)`;
  document.getElementById('editPhotosList').innerHTML=photos.map((p,i)=>`
    <div class="edit-photo-card">
      <img class="edit-photo-img" src="/uploads/${p.filename}" loading="lazy">
      <div class="edit-photo-body">
        <div class="edit-photo-meta">#${i+1} · ${p.exif_timestamp?new Date(p.exif_timestamp).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}</div>
        <textarea class="dta" id="ep-${p.id}" placeholder="사진 설명을 입력하세요...">${p.description||''}</textarea>
        <div class="cfooter" style="margin-top:8px">
          <span class="ok-flash" id="epok-${p.id}"><i class="ti ti-check"></i>저장됨</span>
          <button class="btn-save" onclick="savePhotoDesc(${p.id})">저장</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function saveEditReport(){
  const btn=document.getElementById('btnSaveEdit');
  btn.disabled=true;btn.innerHTML='<div class="spin" style="border-color:rgba(255,255,255,.3);border-top-color:#fff"></div>저장 중...';
  try{
    const body={
      project_name:document.getElementById('er-site').value||editReportData.project_name,
      site_name:document.getElementById('er-site').value,
      work_date:document.getElementById('er-date').value,
      weather:document.getElementById('er-weather').value,
      temperature:document.getElementById('er-temp').value,
      work_type:document.getElementById('er-worktype').value,
      notes:document.getElementById('er-notes').value,
    };
    const r=await fetch(`/api/reports/${editReportData.id}`,{
      method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok)throw new Error((await r.json()).error);
    Object.assign(editReportData,body);
    document.getElementById('editTitle').textContent=body.site_name||body.project_name;
    showToast('저장되었습니다 ✓');
  }catch(e){showToast('저장 오류: '+e.message);}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i>보고서 정보 저장';}
}

async function savePhotoDesc(pid){
  const desc=document.getElementById('ep-'+pid)?.value||'';
  const r=await fetch(`/api/photos/${pid}`,{
    method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({description:desc,is_main:0})
  });
  if(r.ok){
    const ok=document.getElementById('epok-'+pid);
    if(ok){ok.style.display='flex';setTimeout(()=>ok.style.display='none',1400);}
  }else showToast('저장 오류');
}

function backToList(){
  document.getElementById('editScreen').className='';
  document.getElementById('myReportsScreen').className='show';
}
